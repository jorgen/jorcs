name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  solver:
    name: Solver — build & test (C++)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (GCC 14, Ninja, CMake)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++-14 ninja-build
          pipx install cmake
      - name: Build
        run: |
          cmake -S solver -B solver/build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER=gcc-14 -DCMAKE_CXX_COMPILER=g++-14
          cmake --build solver/build
      - name: Test
        run: ./solver/build/tests/tests

  frontend:
    name: Frontend — WASM + typecheck & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.74
      - name: Build the WASM solver
        run: |
          emcmake cmake -S solver/wasm -B solver/wasm-build -DCMAKE_BUILD_TYPE=Release
          cmake --build solver/wasm-build
          mkdir -p frontend/src/wasm
          cp solver/wasm-build/jorcs.js frontend/src/wasm/jorcs.js
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build # tsc -b && vite build
        working-directory: frontend

  backend:
    name: Backend — compile check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      DEPS_DIR: ${{ github.workspace }}/.deps
      CC: gcc-14
      CXX: g++-14
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain (GCC 14, Ninja, CMake ≥ 3.30)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends g++-14 ninja-build
          pipx install cmake
      - name: Fetch pinned dependencies
        run: |
          clone() {
            git clone --filter=blob:none "https://github.com/jorgen/$1.git" "$DEPS_DIR/$1"
            git -C "$DEPS_DIR/$1" checkout --quiet "$2"
          }
          clone vio       f2d0267242e1d22f120926320258f0463ce7d860
          clone structify 7ff77ebeb8da5c28d24d88a55abde350e0f0e0e4
          clone prism     6fc71eb5c854b35abaab86e51631e4b008b9878d
      - name: Build
        run: |
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release \
            -DCUBE_VIO_DIR="$DEPS_DIR/vio" -DCUBE_STRUCTIFY_DIR="$DEPS_DIR/structify" \
            -DCUBE_PRISM_DIR="$DEPS_DIR/prism"
          cmake --build build --target cube_server

  image:
    name: Build & push image
    needs: [frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/jorgen/cube:latest
            ghcr.io/jorgen/cube:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to droplet
    needs: [image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      # The droplet stack (compose + update.sh) is owned by github.com/jorgen/limilind-edge;
      # here we only trigger a redeploy of the cube service.
      - name: Redeploy the cube service over SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
          SHA: ${{ github.sha }}
        run: |
          if [ -z "$DEPLOY_HOST" ] || [ -z "$DEPLOY_SSH_KEY" ]; then
            echo "DEPLOY_HOST/DEPLOY_SSH_KEY not set — skipping deploy."
            exit 0
          fi
          install -d -m 700 "$HOME/.ssh"
          install -m 600 /dev/stdin "$HOME/.ssh/deploy_key" <<<"$DEPLOY_SSH_KEY"
          if [ -n "$DEPLOY_KNOWN_HOSTS" ]; then
            printf '%s\n' "$DEPLOY_KNOWN_HOSTS" >"$HOME/.ssh/known_hosts"
            hostkey="-o StrictHostKeyChecking=yes -o UserKnownHostsFile=$HOME/.ssh/known_hosts"
          else
            hostkey="-o StrictHostKeyChecking=accept-new"
          fi
          ssh $hostkey -i "$HOME/.ssh/deploy_key" "deploy@$DEPLOY_HOST" "/opt/stack/update.sh cube $SHA"
